<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="circle.png">
    <title>404 - Page Not Found</title>
    <link href="style.css" rel="stylesheet">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .error-container h1 {
            font-size: 5em;
            margin: 0;
            font-weight: bold;
        }

        .error-container hyw {
            display: block;
            font-size: 2em;
            margin: 20px 0;
            font-weight: 500;
        }

        .error-container p {
            font-size: 1.3em;
            margin: 20px 0 40px 0;
            max-width: 600px;
        }

        .back-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid #c7ceff;
            border-radius: 5px;
            font-size: 1.1em;
            color: #c7ceff;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.25);
            color: #8d8ead;
            border-color: #8d8ead;
        }

        @media (max-width: 900px) {
            .error-container h1 {
                font-size: 3em;
            }

            .error-container hyw {
                font-size: 1.5em;
            }

            .error-container p {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>404</h1>
    <hyw>Page Not Found</hyw>
    <p>Oops! It looks like you're trying to access a page that doesn't exist. Maybe you took a wrong turn?</p>
    <a href="/" class="back-button">← Back to Main Page</a>
</div>
<footer class="footer">
    hosted on <a href="https://pages.dev">cloudflare pages</a>
</footer>
</body>
</html>
